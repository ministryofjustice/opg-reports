{{- define "teampage-stats" -}}
<section id="stats">

    <div class="tiles">
    {{- if .Data.TotalCost -}}
    <div class="govuk-panel tile">
        <div class="govuk-panel__body">AWS costs<br><strong>{{ Currency .Data.TotalCost "$" }}</strong></div>
        <div class="govuk-panel__body_extra">
            <p class="govuk-body-s">Between <strong>{{ .Request.DateStart }}</strong> and <strong>{{ .Request.DateEnd }}</strong></p>
            <p class="govuk-body-s">Monthly average of <strong>{{ Currency .Data.AverageCostPerMonth "$" }}</strong></p>
        </div>
    </div>
    {{- end -}}


    </div>
</section>

{{- end -}}
