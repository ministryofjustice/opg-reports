{{- define "releases-table" -}}
{{ $rows := .Releases }}
{{ $footer := .Summary }}

<table class="govuk-table reports-table">
    <thead class="govuk-table__head">
      <tr class="govuk-table__row">
        <th scope="col" class="govuk-table__header reports-cell reports-table-heading">Month</th>
        <th scope="col" class="govuk-table__header reports-cell reports-table-heading">Releases</th>
      </tr>
    </thead>
    <tbody class="govuk-table__body">
        {{- range $i, $row := $rows -}}
        <tr class="govuk-table__row">
            <th scope="row" class="govuk-table__header reports-cell reports-table-heading">{{ .Month }}</th>
            <th scope="row" class="govuk-table__header reports-cell reports-table-heading">{{ .Releases }}</th>
        </tr>
        {{- end -}}
    </tbody>
    {{- if $footer -}}
    <tfoot class="govuk-table__foot">
      <tr class="govuk-table__row">
        <th scope="col" class="govuk-table__header" >Total</th>
        <th scope="col" class="govuk-table__header" >{{ $footer.Releases }}</th>
      </tr>
    </tfoot>
    {{- end -}}
  </table>

{{- end -}}
