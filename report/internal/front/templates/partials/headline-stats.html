{{- define "headline-stats" -}}
<section id="stats">
    <div class="tiles">

    {{- if .OverallUptime -}}
    <div class="govuk-panel tile tile--uptime">
        <div class="govuk-panel__body"><strong>{{ Percentage .OverallUptime 3 }}</strong><br>Average uptime</div>
        <div class="govuk-panel__body_extra">
        </div>
    </div>
    {{- end -}}

    {{- if .TotalCost -}}
    <div class="govuk-panel tile tile--cost">
        <div class="govuk-panel__body"><strong>{{ Currency .TotalCost "$" }}</strong><br>AWS costs</div>
        <div class="govuk-panel__body_extra">
        </div>
    </div>
    {{- end -}}



    </div>
</section>

{{- end -}}
