{{- define "team-codeowner-list" -}}
{{- if .Data -}}
<div class="codeownership-list-container">
    <p class="govuk-body">List of repositories that are directly associated with this team via CODEOWNERS or github teams.</p>
    <ul class="govuk-list codeownership-list codeownership-list-size-{{ LengthClass ( len .Data ) }}">
    {{- range $i, $row := .Data -}}
    <li><a href="{{- $row.Url -}}" class="govuk-tag govuk-tag--grey govuk-link codeownership-tag">{{- StripOrgansiation $row.Codebase -}}</a></li>
    {{- end -}}
    </ul>
</div>
{{- end -}}
{{- end -}}
