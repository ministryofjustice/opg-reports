{{- define "unowned-code-list" -}}
{{- if .Data -}}
<div class="codeownership-list-container unowned-list">

    <p class="govuk-body">List of active repositories where the CODEOWNERS and GitHub team doesn't directly link to a team.</p>
    <ul class="govuk-list codeownership-list codeownership-list-size-{{ LengthClass ( len .Data ) }}">
    {{- range $i, $row := .Data -}}
    <li><a href="{{- $row.Url -}}" class="govuk-tag govuk-tag--grey govuk-link codeownership-tag">{{- StripOrgansiation $row.Codebase -}}</a></li>
    {{- end -}}
    </ul>

</div>
{{- end -}}
{{- end -}}
