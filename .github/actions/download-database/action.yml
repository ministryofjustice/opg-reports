name: "Download database"
description: "Download database from bucket"

inputs:
  bucket:
    description: "Name the bucket"
    required: true
  role:
    description: "Role to assume"
    required: true
  dir:
    description: "Directory where everyhting is built in from make."
    default: "./builds"

outputs:
  DB:
    description: "Location of database"
    value: ${{ steps.dl.outputs.location }}


runs:
  using: composite
  steps:
    # configure aws creds
    - name: "Configure AWS credentials"
      uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
      with:
        aws-region: "eu-west-1"
        role-duration-seconds: 900
        role-to-assume: ${{ inputs.role }}
        role-session-name: reports-download-db-from-s3
    # download the database
    - name: "Download database from bucket"
      id: dl
      shell: bash
      env:
        bucket: ${{ inputs.bucket }}
        file: database/api.db
        cmd: ${{ inputs.dir }}/db/db
        dest: ${{ inputs.dir }}/api
      run: |
        ${{ env.cmd }} download \
          --bucket=${{ env.bucket }} \
          --key=${{ env.file}} \
          --directory=${{ env.dest }}
        ls -lhRt ${{ env.dest }}
        echo "location=${{ env.dest }}/${{ env.file }}" >> $GITHUB_OUTPUT
