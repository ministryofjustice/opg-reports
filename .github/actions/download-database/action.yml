name: "Download database"
description: "Download database from bucket"

inputs:
  bucket:
    description: "Name the bucket"
    required: true
  role:
    description: "Role to assume"
    required: true
  dir:
    description: "Directory where everything is built in."
    default: "./builds"

outputs:
  DB:
    description: "Location of database"
    value: ${{ steps.dl.outputs.location }}


runs:
  using: composite
  steps:
    # configure aws creds
    - name: "Configure AWS credentials"
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        aws-region: "eu-west-1"
        role-duration-seconds: 900
        role-to-assume: ${{ inputs.role }}
        role-session-name: reports-download-db-from-s3
    # download the database
    - name: "Download database from bucket with aws cli"
      id: dl
      shell: bash
      env:
        bucket: ${{ inputs.bucket }}
        key: database/api.db
        dest: ${{ inputs.dir }}/database
      run: |
        rm -Rf ${{ env.dest }}
        mkdir -p ${{ env.dest }}
        aws s3 cp \
          s3://${{ env.bucket }}/${{ env.key }} \
          ${{ env.dest }}/
        ls -lhRt ${{ env.dest }}/
        echo "location=${{ env.dest }}/${{ env.file }}" >> $GITHUB_OUTPUT
