name: "Docker: Build, Scan and Push"
description: "Build docker images"

inputs:
  branch_name:
    description: "Git branch name"
    required: true

  tag:
    description: "Semver tag value"
    required: true

  dockerfile:
    description: "Path to Dockerfile"
    required: true

  docker_build_args:
    description: "Build arguments for docker"
    default: ""

  buildx_version:
    description: "Buildx version"
    default: "v0.15.1"

  buildx_platforms:
    description: "List of platforms to generate images for"
    default: "linux/amd64"

  ecr_repository:
    description: "Name of ECR repository"
    required: true

  ecr_registry_id:
    description: "AWS registry ID"
    default: "311462405659"

  checkout_repo:
    description: "Force a checkout of the repository"
    default: "false"

  path_to_live:
    description: "When set to true, pushes images following production conventions."
    default: "false"

  snyk_token:
    description: "Snyk token for OPG organization"
    required: true

  ecr_push_role_arn:
    description: "IAM role ARN for ECR push"
    required: true

  ecr_pull_role_arn:
    description: "IAM role ARN for ECR pull (used for cache and snyk scan)"
    required: true
# outputs:


runs:
  using: "composite"
  steps:
    # checkout self
    - name: "Force checkout repository"
      if: ${{ inputs.checkout_repo == 'true' }}
      id: checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        fetch-tags: true
    # QEMU for multi platforms
    - name: Set up QEMU
      id: setup_qemu
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
    # Setup docker buildx
    - name: "Set up Docker Buildx"
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      id: docker_buildx_setup
      with:
        version: ${{ inputs.buildx_version }}
        platforms: ${{ inputs.buildx_platforms }}
    # Login to ecr registry with pull role (for build cache and snyk scan)
    - name: "Configure AWS credentials for ECR pull"
      uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
      with:
        aws-region: eu-west-1
        role-to-assume: ${{ inputs.ecr_pull_role_arn }}
        role-duration-seconds: 3600
        role-session-name: reports-ecr-pull
    - name: "ECR login (pull)"
      id: ecr_login_pull
      uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
      with:
        mask-password: true
        registries: ${{ inputs.ecr_registry_id }}
    # Build image
    - name: "Build image [image: ${{ inputs.ecr_repository }} ]"
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      env:
        SOURCE_DATE_EPOCH: 0
        BUILD_TAG: ${{ inputs.tag }}
        EXTRA_BUILD_ARGS: ${{ inputs.docker_build_args }}
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.buildx_platforms }}
        push: false
        load: true
        cache-from: type=registry,ref=${{ steps.ecr_login_pull.outputs.registry }}/${{ inputs.ecr_repository }}:cache-${{ inputs.branch_name }}
        tags: |
          ${{ inputs.ecr_repository }}:${{ inputs.tag }}
        build-args: |
          TAG=${{ env.BUILD_TAG }}
          ${{ env.EXTRA_BUILD_ARGS }}

    # Snyk scan
    - name: "Snyk scan [${{ inputs.ecr_repository }}]"
      uses: ministryofjustice/opg-github-actions/actions/snyk-scan@2ad72748485e27f590599a7e9768b9fc0d5b8e03 # v4.8.7
      with:
        SNYK_TEST_IMAGE: ${{ inputs.ecr_repository }}:${{ inputs.tag }}
        SNYK_TOKEN: ${{ inputs.snyk_token }}
        snyk_test_args: --severity-threshold=high

    - name: "Upload Snyk scan results to GitHub Security tab [${{ inputs.ecr_repository }}]"
      uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
      if: always()
      with:
        sarif_file: "test-results/snyk.sarif"

    # Switch to push role for image push
    - name: "Configure AWS credentials for ECR push"
      uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
      with:
        aws-region: eu-west-1
        role-to-assume: ${{ inputs.ecr_push_role_arn }}
        role-duration-seconds: 3600
        role-session-name: reports-ecr-push
    - name: "ECR login (push)"
      id: ecr_login_push
      uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
      with:
        mask-password: true
        registries: ${{ inputs.ecr_registry_id }}

    # Push the image
    # for a PR
    - name: "Push image to ECR [PR]"
      if: ${{ inputs.path_to_live != 'true' }}
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      env:
        SOURCE_DATE_EPOCH: 0
        BUILD_TAG: ${{ inputs.tag }}
        EXTRA_BUILD_ARGS: ${{ inputs.docker_build_args }}
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        builder: ${{ steps.docker_buildx_setup.outputs.name }}
        push: true
        platforms:  ${{ inputs.buildx_platforms }}
        cache-to: type=registry,mode=max,image-manifest=true,oci-mediatypes=true,type=registry,ref=${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:cache-${{ inputs.branch_name }}
        tags: |
          ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:${{ inputs.tag }}
          ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:development-${{ inputs.tag }}
          ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:development-latest
        build-args: |
          TAG=${{ env.BUILD_TAG }}
          ${{ env.EXTRA_BUILD_ARGS }}

    - name: "Summary [tag: ${{ inputs.tag }}]"
      shell: bash
      if: ${{ inputs.path_to_live != 'true' }}
      run: |
        echo "tags:"  >> $GITHUB_STEP_SUMMARY
        echo "- ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:${{ inputs.tag }}"  >> $GITHUB_STEP_SUMMARY
        echo "- ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:development-${{ inputs.tag }}"  >> $GITHUB_STEP_SUMMARY
        echo "- ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:development-latest"  >> $GITHUB_STEP_SUMMARY

    # For live
    - name: "Push image to ECR [Path to live]"
      if: ${{ inputs.path_to_live == 'true' }}
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      env:
        SOURCE_DATE_EPOCH: 0
        BUILD_TAG: ${{ inputs.tag }}
        EXTRA_BUILD_ARGS: ${{ inputs.docker_build_args }}
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        builder: ${{ steps.docker_buildx_setup.outputs.name }}
        push: true
        platforms: ${{ inputs.buildx_platforms }}
        cache-to: type=registry,mode=max,image-manifest=true,oci-mediatypes=true,type=registry,ref=${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:cache-${{ inputs.branch_name }}
        tags: |
          ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:${{ inputs.tag }}
          ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:main-${{ inputs.tag }}
          ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:latest
        build-args: |
          TAG=${{ env.BUILD_TAG }}
          ${{ env.EXTRA_BUILD_ARGS }}

    - name: "Summary [Path to live]"
      shell: bash
      if: ${{ inputs.path_to_live == 'true' }}
      run: |
        echo "tags:"  >> $GITHUB_STEP_SUMMARY
        echo "- ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:${{ inputs.tag }}"  >> $GITHUB_STEP_SUMMARY
        echo "- ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:main-${{ inputs.tag }}"  >> $GITHUB_STEP_SUMMARY
        echo "- ${{ steps.ecr_login_push.outputs.registry }}/${{ inputs.ecr_repository }}:latest"  >> $GITHUB_STEP_SUMMARY
