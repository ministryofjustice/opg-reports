name: "Download database"
description: "Download database from bucket"

inputs:
  bucket:
    description: "Name the bucket"
    required: true
  role:
    description: "Role to assume"
    required: true
  dir:
    description: "Directory where everything is built in."
    default: "./builds"


runs:
  using: composite
  steps:
    # configure aws creds
    - name: "Configure AWS credentials"
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        aws-region: "eu-west-1"
        role-duration-seconds: 900
        role-to-assume: ${{ inputs.role }}
        role-session-name: reports-upload-db-to-s3
    # download the database
    - name: "Upload database to the bucket with aws cli"
      id: up
      shell: bash
      env:
        src: ${{ inputs.dir }}/database/api.db
        bucket: ${{ inputs.bucket }}
        key: database/api.db
      run: |
        ls -lhRt ${{ inputs.dir  }}/
        aws s3 cp \
          --sse AES256 \
          ${{ env.src }} \
          s3://${{ env.bucket }}/database/api.db

