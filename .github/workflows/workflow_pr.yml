name: "[Workflow] PR"

on:
  # # run at 0800 every day
  # schedule:
  #   - cron: '0 8 * * *'
  # run on pr
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: write
  id-token: write
  security-events: write

env:
  BUILD_DIR: "./builds"
  PRERELEASE: "true"
  PATH_TO_LIVE: "false"
  # db
  bucket: "opg-reports-development"
  bucket_role:
    "arn:aws:iam::679638075911:role/opg-reports-github-actions-s3"
    # images
  image_prefix: "development"
  # ecr
  ecr_registry: "311462405659"
  ecr_role: "arn:aws:iam::311462405659:role/opg-reports-github-actions-ecr-push"
  ecr_pull_role: "arn:aws:iam::311462405659:role/opg-reports-github-actions-ecr-pull"
  # terraform
  terraform_workspace: "development"

jobs:
  # setup variables we'll use in the steps
  setup:
    name: "Setup variables"
    runs-on: ubuntu-24.04
    outputs:
      # terraform versions - found dynamically
      terraform_version_account: ${{ steps.terraform_account_version.outputs.version }}
      terraform_version_environment: ${{ steps.terraform_environment_version.outputs.version }}
      # SEMVER & BRANCH NAMES
      branch_name: ${{ steps.semver.outputs.branch }}
      semver_tag: ${{ steps.semver.outputs.tag }}
      gitsha: ${{ steps.revhead.outputs.gitsha }}
    steps:
      # code checkout for semver & terraform version details
      - name: "Checkout"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      # terraform account version
      - name: "Parse terraform account version"
        id: terraform_account_version
        uses: ministryofjustice/opg-github-actions/actions/terraform-version@2ad72748485e27f590599a7e9768b9fc0d5b8e03 # v4.8.7
        with:
          terraform_directory: ./terraform/account
      # terraform env version
      - name: "Parse terraform environment version"
        id: terraform_environment_version
        uses: ministryofjustice/opg-github-actions/actions/terraform-version@2ad72748485e27f590599a7e9768b9fc0d5b8e03 # v4.8.7
        with:
          terraform_directory: ./terraform/environment
      # SEMVER generation
      - name: "Semver tag"
        id: "semver"
        uses: ministryofjustice/opg-github-actions/actions/semver@2ad72748485e27f590599a7e9768b9fc0d5b8e03 # v4.8.7
        with:
          create_release: "false" # dont create the release at the moment
          prerelease: ${{ env.PRERELEASE }}
      # git sha
      - name: "Get git sha"
        id: revhead
        run: |
          sha=$(git rev-parse HEAD)
          echo "gitsha=${sha}" >> $GITHUB_OUTPUT

  # run go tests
  tests:
    name: "Run tests"
    runs-on: ubuntu-24.04
    needs:
      - setup
    steps:
      # checkout self
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # setup go
      - name: "Setup go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          cache: true
          go-version-file: "./go.mod"
      # run tests
      - name: "Run tests"
        run: |
          go mod tidy
          go test -count=1 -cover -covermode=atomic ./...

  # build and push docker images
  builder:
    name: "Build & push docker images"
    runs-on: ubuntu-24.04
    needs:
      - tests
      - setup
    strategy:
      fail-fast: true
      matrix:
        image:
          - front
          - api
    steps:
      # checkout self
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      # setup go
      - name: "[${{ matrix.image }}] Setup go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          cache: false
          go-version-file: "./go.mod"
      # build
      - name: "[${{ matrix.image }}] Make - build-cmds"
        run: |
          make build-prep
          make build-cmds
          ls -lhRt ${{ env.BUILD_DIR }}
      - name: "[${{ matrix.image }}] Make - front assets"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          make front-assets
          ls -lhRt ${{ env.BUILD_DIR }}
      # download production database
      - name: "[${{ matrix.image }}] Download database (${{ env.bucket }})"
        if: ${{ matrix.image == 'api' }}
        id: db_download
        uses: ./.github/actions/database-download
        with:
          bucket: ${{ env.bucket }}
          role: ${{ env.bucket_role }}
          dir: ${{ env.BUILD_DIR }}
      # migrate db to new setup
      - name: "[${{ matrix.image }}] Migrate database"
        if: ${{ matrix.image == 'api' }}
        env:
          db: ${{ steps.db_download.outputs.DB }}
        run: |
          ${{ env.BUILD_DIR }}/migrate --db="${{ env.db }}"
      # build the image
      - name: "[${{ matrix.image }}] Build and push image"
        id: build_image
        uses: ./.github/actions/docker-build-scan-push
        with:
          ecr_registry_id: ${{ env.ecr_registry  }}
          ecr_repository: "opg-reports/${{ matrix.image }}"
          branch_name: ${{ needs.setup.outputs.branch_name }}
          tag: ${{ needs.setup.outputs.semver_tag }}
          dockerfile: "./docker/${{ matrix.image }}/Dockerfile"
          path_to_live: ${{ env.PATH_TO_LIVE }}
          snyk_token: ${{ secrets.SNYK_OPG_ORG_TOKEN }}
          ecr_pull_role_arn: ${{ env.ecr_pull_role }}
          ecr_push_role_arn: ${{ env.ecr_role }}
      # listing
      - name: "[${{ matrix.image }}] List build directory"
        run: ls -lhRt ./builds/

  # Run the terraform for development workspace
  terraform:
    name: "Terraform"
    runs-on: ubuntu-24.04
    needs:
      - builder
      - setup
    steps:
      # checkout self
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      #  setup ssh keys using deploy key composite action
      - uses: ministryofjustice/opg-github-actions/actions/github-deploy-key@ceeda9d30ec7f6705c819d0b7664b9a79df99a3b # v4.8.7
        with:
          deploy_key: ${{ secrets.SSH_PRIVATE_KEY_EXTERNAL_MODULES }}
      - name: "Account level terraform"
        uses: ./.github/actions/terraform
        with:
          apply: true
          directory: ./terraform/account
          workspace: ${{ env.terraform_workspace }}
          version: ${{ needs.setup.outputs.terraform_version_account }}
          snyk_token: ${{ secrets.SNYK_OPG_ORG_TOKEN }}
          ecr_registry: ${{ env.ecr_registry }}
          ecr_pull_role_arn: ${{ env.ecr_pull_role }}
          terraform_role_arn: "arn:aws:iam::631181914621:role/oidc-opg-reports-development"
      - name: "Environment level terraform"
        uses: ./.github/actions/terraform
        env:
          TF_VAR_api_image_tag: ${{ env.image_prefix }}-${{ needs.setup.outputs.semver_tag }}
          TF_VAR_front_image_tag: ${{ env.image_prefix }}-${{ needs.setup.outputs.semver_tag }}
          TF_VAR_semver_tag: ${{ needs.setup.outputs.semver_tag }}
          TF_VAR_commit_sha: ${{ needs.setup.outputs.gitsha }}
        with:
          apply: true
          directory: ./terraform/environment
          workspace: ${{ env.terraform_workspace }}
          version: ${{ needs.setup.outputs.terraform_version_environment }}
          snyk_token: ${{ secrets.SNYK_OPG_ORG_TOKEN }}
          ecr_registry: ${{ env.ecr_registry }}
          ecr_pull_role_arn: ${{ env.ecr_pull_role }}
          terraform_role_arn: "arn:aws:iam::631181914621:role/oidc-opg-reports-development"
  # release this version
  release:
    name: "Create release"
    runs-on: ubuntu-24.04
    needs:
      - terraform
      - setup
    steps:
      # code checkout deep for tagging release
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: "Create release [${{ needs.setup.outputs.semver_tag }}]"
        uses: ministryofjustice/opg-github-actions/actions/release@2ad72748485e27f590599a7e9768b9fc0d5b8e03 # v4.8.7
        with:
          tag: ${{ needs.setup.outputs.semver_tag }}
          prerelease: ${{ env.PRERELEASE }}
          github_token: ${{ github.token }}

  # final step
  end:
    name: "End"
    runs-on: ubuntu-24.04
    needs:
      - release
    steps:
      - run: echo "End"
