name: "[Reports] Codebases & Codeowners"
on:
  # pull_request:
  #   branches:
  #     - main
  # run at 03:00 on Monday, Wednesday, and Friday.
  schedule:
    - cron: '0 3 * * 1,3,5'

# permissions
permissions:
  contents: write
  id-token: write
  actions: read
  pull-requests: none

jobs:
  # use the importer workflow to run everything
  run_codebases:
    name: "Run codebases with stats import"
    uses: ./.github/workflows/_importer_github.yml
    secrets: inherit
    with:
      sub_cmd: "codebases"
      args: "--stats"
      upload_to_prod: false
  # use the importer workflow to run everything
  run_codebase_stats:
    name: "Run codebase stats import"
    uses: ./.github/workflows/_importer_github.yml
    secrets: inherit
    with:
      sub_cmd: "codebases"

      upload_to_prod: false
  run_codeowners:
    name: "Run codebase owners command"
    needs:
      - run_codebases
    uses: ./.github/workflows/_importer_github.yml
    secrets: inherit
    with:
      sub_cmd: "codebases"
      args: "--owners"
      upload_to_prod: false
  # an end step for cleaner workflow
  end:
    name: "End"
    runs-on: ubuntu-24.04
    needs:
      - run_codebases
      - run_codeowners
    steps:
      - run: |
          echo "done"
