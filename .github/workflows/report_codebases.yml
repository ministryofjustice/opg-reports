name: "[Reports] Codebases & Codeowners"
on:
  pull_request:
    branches:
      - main
  # run at 03:00 on Monday, Wednesday, and Friday.
  schedule:
    - cron: '0 3 * * 1,3,5'

# permissions
permissions:
  contents: write
  id-token: write
  actions: read
  pull-requests: none

jobs:
  # use the importer workflow to run everything
  run_codebases:
    name: "Run codebases command"
    uses: ./.github/workflows/_importer_github.yml
    secrets: inherit
    with:
      sub_cmd: "codebases"
      bucket: "opg-reports-development"
      bucket_role: "arn:aws:iam::679638075911:role/opg-reports-github-actions-s3"
      # bucket: "opg-reports-production"
      # bucket_role: "arn:aws:iam::997462338508:role/opg-reports-github-actions-s3"
  run_codeowners:
    name: "Run codeowners command"
    needs:
      - run_codebases
    uses: ./.github/workflows/_importer_github.yml
    secrets: inherit
    with:
      sub_cmd: "codeowners"
      bucket: "opg-reports-development"
      bucket_role: "arn:aws:iam::679638075911:role/opg-reports-github-actions-s3"

  # an end step for cleaner workflow
  end:
    name: "End"
    runs-on: ubuntu-24.04
    needs:
      - run_codebases
      - run_codeowners
    steps:
      - run: |
          echo "done"
